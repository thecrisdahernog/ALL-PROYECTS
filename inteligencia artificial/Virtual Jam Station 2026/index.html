<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Jam Station 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Virtual Jam Station</h1>
        <p>Toca, graba y aprende en tiempo real</p>
    </header>

    <main class="instrument-container">
        <nav class="instrument-selector">
            <button id="btn-piano" onclick="showInstrument('piano')" class="active">🎹 Piano</button>
            <button id="btn-guitarra" onclick="showInstrument('guitarra')">🎸 Guitarra</button>
        </nav>

        <section id="piano-section" class="instrument">
    <div class="piano-controls">
        <span>Usa tu mouse para las 4 octavas o teclado para la central</span>
    </div>
    <div class="piano-scroll-container">
        <div class="piano-keyboard" id="piano-keyboard">
            </div>
    </div>
</section>

        <section id="guitarra-section" class="instrument" style="display:none;">
    <div class="guitar-container">
        <div class="guitar-neck">
            <div class="strings-container">
                <div class="string" data-string="0"></div>
                <div class="string" data-string="1"></div>
                <div class="string" data-string="2"></div>
                <div class="string" data-string="3"></div>
                <div class="string" data-string="4"></div>
                <div class="string" data-string="5"></div>
            </div>
            <div class="frets-container">
                <div class="fret"></div><div class="fret"></div>
                <div class="fret"></div><div class="fret"></div>
                <div class="fret"></div><div class="fret"></div>
            </div>
            <div class="notes-grid" id="guitar-notes">
                </div>
        </div>
    </div>
    <div class="guitar-controls">
        <p>Haz clic en los trastes para tocar notas individuales o desliza sobre las cuerdas a la izquierda.</p>
    </div>
</section>
    <section class="chord-selector">
    <h3>Guía de Acordes Académica</h3>
    <div class="chord-group">
        <h4>Mayores</h4>
        <div class="chord-buttons">
            <button onclick="showChord('C')">C (Do)</button>
            <button onclick="showChord('D')">D (Re)</button>
            <button onclick="showChord('E')">E (Mi)</button>
            <button onclick="showChord('F')">F (Fa)</button>
            <button onclick="showChord('G')">G (Sol)</button>
            <button onclick="showChord('A')">A (La)</button>
            <button onclick="showChord('B')">B (Si)</button>
        </div>
    </div>
    <div class="chord-group">
        <h4>Menores</h4>
        <div class="chord-buttons">
            <button onclick="showChord('Cm')">Cm</button>
            <button onclick="showChord('Dm')">Dm</button>
            <button onclick="showChord('Em')">Em</button>
            <button onclick="showChord('Fm')">Fm</button>
            <button onclick="showChord('Am')">Am</button>
            <button onclick="showChord('Bm')">Bm</button>
        </div>
    </div>
    <button onclick="clearHighlights()" class="btn-clear" style="margin-top: 15px;">Limpiar Guía</button>
</section>
    </main>

    <script src="script.js"></script>
</body>
</html>
